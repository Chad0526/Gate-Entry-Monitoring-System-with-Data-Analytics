{% load i18n %}
{# Fragment for full page + AJAX: table + pagination. include_assets=False avoids duplicating pagination <style>/<script> on each refresh. #}
<div class="student-list-ajax-meta" data-clear-search-url="{{ clear_search_url }}" data-has-search="{% if search_q %}1{% else %}0{% endif %}" hidden></div>
<div class="table-wrap">
{% if page_obj %}
{% include 'snippets/pagination.html' with page_obj=page_obj query_extra=query_extra query_extra_base=query_extra_base per_page=per_page per_page_options=per_page_options position='top' include_assets=False %}
{% endif %}
<table class="table table-striped table-hover students-table-aligned">
  <thead>
    <tr>
      <th class="col-qr">QR code</th>
      <th class="col-id">Student ID</th>
      <th class="col-name">Name</th>
      <th class="col-sex">Sex</th>
      <th class="col-course-year">Program / Year<br>Section</th>
      <th class="col-email">Email</th>
      <th class="col-status">Status</th>
      <th class="col-actions">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for s in students %}
      <tr id="student-row-{{ s.pk }}" data-student-pk="{{ s.pk }}" {% if highlight_student_pk and highlight_student_pk == s.pk %}class="student-row-highlight"{% endif %}>
        <td class="align-middle col-qr">
          <a href="{% url 'gate-student-qr' s.pk %}" target="_blank" title="Open full-size QR (for ID card print)" class="d-inline-block qr-cell-wrap">
            <img src="{% url 'gate-student-qr' s.pk %}?v=2" alt="QR {{ s.student_id }}" width="56" height="56" class="rounded border student-qr-img" style="image-rendering: pixelated; image-rendering: crisp-edges;" onerror="this.onerror=null; this.style.display='none'; var w=this.closest('.qr-cell-wrap'); if(w && !w.querySelector('.qr-fallback')) { var s=document.createElement('span'); s.className='qr-fallback d-inline-block rounded border bg-light text-center text-muted small'; s.style.width='56px'; s.style.height='56px'; s.style.lineHeight='56px'; s.style.fontSize='10px'; s.textContent='QR'; w.appendChild(s); }">
          </a>
        </td>
        <td class="align-middle col-id"><span class="registry-id-emphasis">{{ s.student_id }}</span></td>
        <td class="align-middle col-name">{{ s.get_full_name }}</td>
        <td class="align-middle col-sex">{{ s.get_sex_display|default:"—" }}</td>
        <td class="align-middle col-course-year">{% if s.course or s.year_level or s.section %}<span class="d-block">{% if s.course or s.year_level %}{{ s.course }}{% if s.year_level %} / {{ s.get_year_level_display }}{% endif %}{% elif s.section %}{{ s.section }}{% endif %}</span>{% if s.section %}{% if s.course or s.year_level %}<span class="d-block text-muted small mt-0">{{ s.section }}</span>{% endif %}{% endif %}{% else %}—{% endif %}</td>
        <td class="align-middle col-email">{{ s.email|default:"—" }}</td>
        <td class="align-middle col-status">
          {% if s.account_status == 'APPROVED' %}<span class="badge badge-success">{{ s.get_account_status_display }}</span>{% else %}<span class="badge badge-secondary">{{ s.get_account_status_display }}</span>{% endif %}
        </td>
        <td class="align-middle col-actions">
          {% if can_edit_students %}
          <a href="{% url 'gate-student-edit' s.pk %}" class="btn btn-sm btn-info" title="Edit"><i class="fas fa-edit"></i></a>
          {% endif %}
          <button type="button" class="btn btn-sm btn-outline-primary student-eid-btn" title="View / print student e-ID card" data-card-url="{% url 'gate-student-eid' s.pk %}"><i class="fas fa-id-card mr-1"></i> e-ID</button>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="8" class="text-muted text-center">No students.{% if can_edit_students %} <button type="button" class="btn btn-link p-0 align-baseline" data-toggle="modal" data-target="#studentCreateModal">Add one</button> or <a href="{% url 'gate-student-import' %}">Import CSV</a>{% endif %}.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% if page_obj %}
<div class="px-3 py-2 text-muted small" style="border-top:1px solid #e2e8f0;">{{ page_obj.paginator.count }} total</div>
{% include 'snippets/pagination.html' with page_obj=page_obj query_extra=query_extra query_extra_base=query_extra_base per_page=per_page per_page_options=per_page_options include_assets=False %}
{% endif %}
</div>
