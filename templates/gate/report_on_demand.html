{% extends 'base/base.html' %}
{% block title %}On-demand Report - {{ site_name }}{% endblock title %}
{% block breadcrumb %}On-demand Report{% endblock breadcrumb %}

{% block content %}
<div class="row mb-3">
  <div class="col-12">
    <a href="{% url 'reports-hub' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left mr-1"></i> Reports hub</a>
    <a href="{% url 'report-list' %}" class="btn btn-outline-primary ml-2"><i class="fas fa-list mr-1"></i> Generated reports</a>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h5 class="m-0">Generate report by date range</h5>
  </div>
  <div class="card-body">
    <form method="post" action="{% url 'report-on-demand' %}" class="form-horizontal">
      {% csrf_token %}
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="date_from">Date from</label>
            <input type="date" name="date_from" id="date_from" class="form-control" value="{{ default_from|date:'Y-m-d' }}" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="date_to">Date to</label>
            <input type="date" name="date_to" id="date_to" class="form-control" value="{{ default_to|date:'Y-m-d' }}" required>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="group_by">Group by</label>
        <select name="group_by" id="group_by" class="form-control">
          <option value="student">By student</option>
          <option value="gate">By gate (device)</option>
          <option value="time_window">By time window (e.g. 6–10 AM)</option>
          <option value="course_section">By course/section</option>
        </select>
      </div>
      <div class="form-group">
        <label>Output format</label>
        <div>
          <label class="mr-3"><input type="radio" name="format" value="html" checked> View in browser</label>
          <label class="mr-3"><input type="radio" name="format" value="csv"> Download CSV</label>
          <label><input type="radio" name="format" value="xlsx"> Download Excel</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-chart-bar mr-1"></i> Generate</button>
    </form>
  </div>
</div>
{% endblock content %}
