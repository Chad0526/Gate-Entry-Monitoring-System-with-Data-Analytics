{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate scanner — {{ site_name }}</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a1210; }
    iframe {
      border: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    src="{{ embed_scanner_url }}"
    title="Gate QR scanner"
    allow="camera; microphone; fullscreen"
    referrerpolicy="same-origin"
  ></iframe>
</body>
</html>
